{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width:520px;">
        <h2>📈 Buy Stock</h2>
        <p class="auth-subtitle">Purchase shares of {{ stock.name }}</p>

        <div class="ai-box" style="margin-bottom:1.5rem;">
            <h3>📊 Stock Info</h3>
            <p>Symbol: <strong>{{ stock.symbol }}</strong></p>
            <p>Current Price: <strong class="price">${{ stock.price }}</strong></p>
            <p>Sector: <strong>{{ stock.sector }}</strong></p>
            <p>Industry: <strong>{{ stock.industry }}</strong></p>
        </div>

        <form method="POST" action="/buy">
            <input type="hidden" name="stock_id" value="{{ stock.id }}">
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" name="quantity" min="1" value="1" required>
            </div>
            <div class="form-group">
                <label>Estimated Total</label>
                <input type="text" id="total" value="${{ stock.price }}" readonly
                    style="opacity:0.6;cursor:not-allowed;">
            </div>
            <button type="submit" class="btn-primary full-width">
                ✅ Confirm Buy
            </button>
        </form>
        <br>
        <a href="/dashboard" class="btn-secondary full-width"
            style="display:block;text-align:center;">
            ← Back to Dashboard
        </a>
    </div>
</div>

<script>
    const price = parseFloat("{{ stock.price }}");
    const qtyInput = document.querySelector('input[name="quantity"]');
    const totalInput = document.getElementById('total');
    qtyInput.addEventListener('input', function() {
        const total = (price * this.value).toFixed(2);
        totalInput.value = '$' + total;
    });
</script>
{% endblock %}
